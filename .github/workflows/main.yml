name: OuoBotAuto247
on:
  schedule:
    - cron: '*/30 * * * *'  # Ejecución automática cada 30 min
  workflow_dispatch:       # Ejecución manual cuando quieras

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar Playwright
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Iniciar Bot
        run: python bot.py
        env:
          PYTHONUNBUFFERED: 1
