name: OuoBotCloud
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Playwright
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Run
        run: python bot.py
        env:
          PYTHONUNBUFFERED: 1
